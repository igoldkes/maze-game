name: Build Game

on:
  push:
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: maze_game
        run: cargo build --release

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            target/release/maze_game.exe
            assets/

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: maze_game
        run: cargo build --release

      - name: Upload Mac Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            target/release/maze_game
            assets/